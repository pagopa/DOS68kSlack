# .github/workflows/deploy.yml
#
# Deploy Pipeline – DOS68K Slack Bot
#
# Trigger: push su main (dopo merge di PR).
# Punto aperto #1: build + push immagine Docker su ECR con tag = commit SHA.
# Punto aperto #2: i test DEVONO passare prima del deploy (needs: test).
#
# Secrets richiesti nel repository GitHub:
#   AWS_ROLE_ARN          – IAM Role con permessi ECR + ECS (OIDC)
#   ECR_REPOSITORY        – URI completo ECR (es: 123456789.dkr.ecr.eu-south-1.amazonaws.com/dos68k-slack-bot)
#   ECS_CLUSTER           – Nome del cluster ECS
#   ECS_SERVICE           – Nome del servizio ECS
#   ECS_TASK_DEFINITION   – Nome della task definition ECS

name: Deploy – Build & Push ECR → ECS

on:
  push:
    branches: [main]

permissions:
  id-token: write   # necessario per OIDC authentication con AWS
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # Step 1: Test (punto aperto #2 – build non parte se i test falliscono)
  # -----------------------------------------------------------------------
  test:
    name: Unit Tests (gate pre-deploy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit tests
        env:
          SLACK_BOT_TOKEN: xoxb-test-token
          SLACK_SIGNING_SECRET: test_signing_secret_32chars_padding
          CHATBOT_API_KEY: test-api-key
          CHATBOT_BASE_URL: https://fake.example.com
          DYNAMODB_SESSIONS_TABLE: test-sessions
          AWS_DEFAULT_REGION: eu-south-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
        run: pytest tests/ -v --tb=short

  # -----------------------------------------------------------------------
  # Step 2: Build & Push Docker image (punto aperto #1)
  # -----------------------------------------------------------------------
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test   # BLOCCATO se test fallisce
    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-south-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: build
        env:
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          # Punto aperto #1: tag = commit SHA completo
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REPOSITORY}:${IMAGE_TAG}"
          LATEST_URI="${ECR_REPOSITORY}:latest"

          docker build \
            --label "git.commit=${GITHUB_SHA}" \
            --label "git.branch=${GITHUB_REF_NAME}" \
            --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "${IMAGE_URI}" \
            -t "${LATEST_URI}" \
            .

          docker push "${IMAGE_URI}"
          docker push "${LATEST_URI}"

          echo "image-uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "✅ Image pushed: ${IMAGE_URI}"

  # -----------------------------------------------------------------------
  # Step 3: Deploy su ECS (aggiorna il service con la nuova immagine)
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-south-1

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_TASK_DEFINITION }} \
            --query taskDefinition \
            > task-definition.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: dos68k-slack-bot
          image: ${{ needs.build-and-push.outputs.image-uri }}

      - name: Deploy updated task definition to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deployment summary
        run: |
          echo "## 🚀 Deploy completato" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ needs.build-and-push.outputs.image-uri }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **ECS Service**: ${{ secrets.ECS_SERVICE }}" >> $GITHUB_STEP_SUMMARY
